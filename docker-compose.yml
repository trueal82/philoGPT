version: '3.8'

# All deployment values come from the root .env file (cp .env.example .env).
# Variable syntax: ${VAR} — substituted by Compose from .env at startup.

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/philogpt
      - PORT=5001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${FRONTEND_URL},${ADMIN_URL}
      - SEED_ON_EMPTY_DB=true
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # --- Optional OAuth (set in .env to enable) ---
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    depends_on:
      - mongo
    restart: unless-stopped

  admin-frontend:
    build: ./admin-frontend
    ports:
      - "3001:3001"
    environment:
      - BACKEND_URL=${API_URL}
    restart: unless-stopped

  user-frontend:
    build: ./user-frontend
    ports:
      - "3002:3002"
    environment:
      - BACKEND_URL=${API_URL}
      - SOCKET_URL=${API_URL}
    restart: unless-stopped

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
